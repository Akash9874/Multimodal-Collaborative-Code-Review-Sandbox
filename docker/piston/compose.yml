# A self-hosted Piston. The public instance (emkc.org) became whitelist-only on 2026-02-15:
# GET /runtimes still answers, POST /execute returns 401. The master spec's §12 risk table named
# this exact mitigation — "the CodeExecutor seam allows self-hosting Piston later" — and it costs
# us no application code at all: only PISTON_URL moves.
#
#   pnpm piston:up      boot it and install the runtimes we pin in @sandbox/shared
#   pnpm piston:down    stop it
#
# `privileged` is not optional: Piston isolates each run with nsjail/cgroups, which needs the
# capabilities to create namespaces. That is precisely the isolation the highest-priority NFR is
# asking for — user code runs in there, never on the host.

services:
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: crdt-sandbox-piston
    privileged: true
    restart: unless-stopped
    ports:
      - '2000:2000'
    environment:
      # Piston's own defaults are stricter than the requirements we are building to, and it rejects
      # a request that exceeds them rather than clamping it. The PRD's NFR §5.1 names a 5s maximum
      # execution time (Piston defaults to 3s), and MAX_OUTPUT_BYTES in @sandbox/shared is 64 KiB
      # (Piston defaults to 1 KiB). These two lines are what let RUN_TIMEOUT_MS mean what it says.
      PISTON_RUN_TIMEOUT: 5000
      PISTON_COMPILE_TIMEOUT: 10000
      PISTON_OUTPUT_MAX_SIZE: 65536
    volumes:
      - piston-packages:/piston/packages
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- http://localhost:2000/api/v2/runtimes || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  piston-packages:
